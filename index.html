<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtCoin | A Rede Social de Arte Valorizada</title>
    <style>
        /* ================= V VARIÁVEIS E BASE ================= */
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --comum: #8b949e;
            --raro: #1f6feb;
            --epico: #8957e5;
            --lendario: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 60px; }

        /* ================= HEADER (GLASSMORPHISM) ================= */
        header {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px;
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 24px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(88, 166, 255, 0.5); }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .username { color: var(--text-main); font-weight: 600; }
        .wallet { background: #238636; padding: 8px 20px; border-radius: 30px; font-weight: bold; color: white; box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4); }

        /* ================= LAYOUT PRINCIPAL ================= */
        main { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        @media (max-width: 800px) { main { grid-template-columns: 1fr; } }

        .panel { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

        /* ================= STUDIO (CANVAS AVANÇADO) ================= */
        .studio-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .canvas-container { background: #fff; border-radius: 12px; overflow: hidden; position: relative; }
        canvas { width: 100%; aspect-ratio: 1; cursor: crosshair; touch-action: none; display: block; }
        
        .tools { display: flex; gap: 10px; margin-top: 15px; align-items: center; }
        input[type="color"] { border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; background: transparent; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }
        
        .invest-section { margin-top: 20px; display: flex; gap: 10px; }
        input[type="number"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; outline: none; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .btn-post { background: var(--accent); color: #000; flex: 1; }
        .btn-post:hover { background: #79c0ff; transform: translateY(-2px); }
        .btn-clear { background: #da3633; color: white; }

        /* ================= FEED DE ARTES ================= */
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .art-card { background: rgba(0,0,0,0.4); border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: 0.3s; }
        .art-card:hover { transform: translateY(-5px); }
        .art-image { width: 100%; aspect-ratio: 1; background: #fff; object-fit: contain; }
        .art-details { padding: 15px; }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .badge.comum { background: var(--comum); color: #000; }
        .badge.raro { background: var(--raro); color: #fff; box-shadow: 0 0 15px var(--raro); }
        .badge.epico { background: var(--epico); color: #fff; box-shadow: 0 0 20px var(--epico); }
        .badge.lendario { background: var(--lendario); color: #000; box-shadow: 0 0 30px var(--lendario); animation: brilho 2s infinite alternate; }

        @keyframes brilho { from { filter: brightness(1); } to { filter: brightness(1.4); } }

        .price-tag { font-size: 20px; color: #58a6ff; font-weight: bold; margin: 10px 0; }
        .btn-buy { width: 100%; background: #238636; color: white; padding: 10px; margin-top: 10px; }
        .btn-buy:disabled { background: #30363d; cursor: not-allowed; color: #8b949e; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ArtCoin</div>
        <div class="user-profile">
            <span class="username">@respaw027</span>
            <div class="wallet">🪙 <span id="balanceDisplay">1000</span></div>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="studio-header">
                <h2>Studio Criativo</h2>
            </div>
            
            <div class="canvas-container">
                <canvas id="paintCanvas" width="500" height="500"></canvas>
            </div>

            <div class="tools">
                <input type="color" id="colorPicker" value="#000000" title="Cor do Pincel">
                <input type="range" id="brushSize" min="1" max="50" value="5" title="Tamanho do Pincel">
                <button class="btn-clear" onclick="studio.clear()">🗑️</button>
            </div>

            <div class="invest-section">
                <input type="number" id="investInput" placeholder="Investimento (mín: 10)" min="10">
                <button class="btn-post" onclick="app.publishArt()">Cunhar Arte ✨</button>
            </div>
        </section>

        <section class="panel">
            <h2>Mercado Global</h2>
            <div class="feed-grid" id="feedContainer">
                </div>
        </section>
    </main>

    <script>
        /**
         * CLASSE DO BANCO DE DADOS LOCAL (LocalStorage)
         */
        class Database {
            static getBalance() {
                return parseInt(localStorage.getItem('artcoin_balance')) || 1000;
            }
            static setBalance(amount) {
                localStorage.setItem('artcoin_balance', amount);
                document.getElementById('balanceDisplay').innerText = amount;
            }
            static getPosts() {
                return JSON.parse(localStorage.getItem('artcoin_posts')) || [];
            }
            static savePost(post) {
                const posts = this.getPosts();
                posts.unshift(post); // Adiciona no início
                localStorage.setItem('artcoin_posts', JSON.stringify(posts));
            }
            static updatePostOwner(postId, newOwner) {
                let posts = this.getPosts();
                let post = posts.find(p => p.id === postId);
                if(post) post.owner = newOwner;
                localStorage.setItem('artcoin_posts', JSON.stringify(posts));
            }
        }

        /**
         * CLASSE DO CANVAS AVANÇADO
         */
        class CanvasStudio {
            constructor() {
                this.canvas = document.getElementById('paintCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.isDrawing = false;
                
                // Redimensionamento interno real do canvas
                this.canvas.width = 500;
                this.canvas.height = 500;
                
                this.ctx.lineJoin = 'round';
                this.ctx.lineCap = 'round';
                
                this.setupEvents();
                this.clear(); // Preenche com branco
            }

            setupEvents() {
                this.canvas.addEventListener('mousedown', (e) => this.startPosition(e));
                this.canvas.addEventListener('mouseup', () => this.endPosition());
                this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                
                // Suporte Mobile (Touch)
                this.canvas.addEventListener('touchstart', (e) => this.startPosition(e.touches[0]));
                this.canvas.addEventListener('touchend', () => this.endPosition());
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    this.draw(e.touches[0]);
                }, { passive: false });
            }

            startPosition(e) {
                this.isDrawing = true;
                this.draw(e);
            }

            endPosition() {
                this.isDrawing = false;
                this.ctx.beginPath();
            }

            draw(e) {
                if (!this.isDrawing) return;
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                
                this.ctx.lineWidth = document.getElementById('brushSize').value;
                this.ctx.strokeStyle = document.getElementById('colorPicker').value;

                this.ctx.lineTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.moveTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
            }

            clear() {
                this.ctx.fillStyle = "#ffffff";
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            getImageData() {
                return this.canvas.toDataURL('image/png');
            }
        }

        /**
         * CLASSE PRINCIPAL DO APP (Lógica de Negócios)
         */
        class ArtCoinApp {
            constructor() {
                this.currentUser = "@respaw027";
                Database.setBalance(Database.getBalance()); // Inicializa UI
                this.loadFeed();
            }

            publishArt() {
                const investInput = document.getElementById('investInput');
                const investAmount = parseInt(investInput.value);
                const currentBalance = Database.getBalance();

                if (isNaN(investAmount) || investAmount < 10) {
                    alert("O investimento mínimo é de 10 moedas."); return;
                }
                if (investAmount > currentBalance) {
                    alert("Saldo insuficiente na carteira!"); return;
                }

                // Deduz o valor
                Database.setBalance(currentBalance - investAmount);

                // Define Raridade
                let rarity = "comum";
                if (investAmount >= 1000) rarity = "lendario";
                else if (investAmount >= 300) rarity = "epico";
                else if (investAmount >= 50) rarity = "raro";

                // Preço de venda = Investimento + 50% de lucro garantido
                const sellPrice = Math.floor(investAmount * 1.5);

                const newPost = {
                    id: Date.now().toString(),
                    image: studio.getImageData(),
                    creator: this.currentUser,
                    owner: this.currentUser,
                    rarity: rarity,
                    invested: investAmount,
                    price: sellPrice
                };

                Database.savePost(newPost);
                studio.clear();
                investInput.value = '';
                this.loadFeed(); // Atualiza a tela
            }

            buyArt(postId, price) {
                const currentBalance = Database.getBalance();
                if (currentBalance < price) {
                    alert("Moedas insuficientes para essa aquisição!"); return;
                }

                Database.setBalance(currentBalance - price);
                Database.updatePostOwner(postId, this.currentUser);
                this.loadFeed(); // Atualiza UI
            }

            loadFeed() {
                const feedContainer = document.getElementById('feedContainer');
                feedContainer.innerHTML = '';
                const posts = Database.getPosts();

                posts.forEach(post => {
                    const isOwner = post.owner === this.currentUser;
                    
                    const card = document.createElement('div');
                    card.className = `art-card`;
                    card.style.borderColor = `var(--${post.rarity})`;
                    
                    card.innerHTML = `
                        <img src="${post.image}" class="art-image" alt="Arte">
                        <div class="art-details">
                            <span class="badge ${post.rarity}">${post.rarity}</span>
                            <p style="font-size: 14px; margin-bottom: 5px;">Criador: <b>${post.creator}</b></p>
                            <p style="font-size: 14px;">Dono atual: <b>${isOwner ? 'Você' : post.owner}</b></p>
                            <div class="price-tag">🪙 ${post.price}</div>
                            <button class="btn-buy" 
                                ${isOwner ? 'disabled' : ''} 
                                onclick="app.buyArt('${post.id}', ${post.price})">
                                ${isOwner ? 'Na sua coleção' : 'Comprar Obra'}
                            </button>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            }
        }

        // Inicializando o sistema
        const studio = new CanvasStudio();
        const app = new ArtCoinApp();

    </script>
</body>
</html>
