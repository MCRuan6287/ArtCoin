<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtCoin | A Rede Social de Arte Valorizada</title>
    <style>
        /* ================= VARIÁVEIS ================= */
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.95);
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --comum: #8b949e;
            --raro: #1f6feb;
            --epico: #8957e5;
            --lendario: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 80px; }

        /* ================= HEADER ================= */
        header {
            position: sticky; top: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 22px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(88, 166, 255, 0.5); }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .wallet { background: #238636; padding: 6px 15px; border-radius: 20px; font-weight: bold; color: white; }

        /* ================= MAIN FEED ================= */
        main { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .feed-grid { display: flex; flex-direction: column; gap: 25px; }
        
        .art-card { background: #161b22; border-radius: 16px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; }
        .art-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .art-image { width: 100%; aspect-ratio: 1; background: #fff; object-fit: cover; }
        .art-details { padding: 15px; }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .badge.comum { background: var(--comum); color: #000; }
        .badge.raro { background: var(--raro); color: #fff; box-shadow: 0 0 10px var(--raro); }
        .badge.epico { background: var(--epico); color: #fff; box-shadow: 0 0 15px var(--epico); }
        .badge.lendario { background: var(--lendario); color: #000; box-shadow: 0 0 25px var(--lendario); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .price-tag { font-size: 22px; color: var(--accent); font-weight: bold; }
        .btn-buy { background: #238636; color: white; padding: 8px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-buy:disabled { background: #30363d; cursor: not-allowed; color: #8b949e; }

        /* ================= FLOATING ACTION BUTTON (+) ================= */
        .fab {
            position: fixed; bottom: 30px; right: 30px; z-index: 90;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent); color: #000;
            font-size: 30px; font-weight: bold; border: none;
            cursor: pointer; box-shadow: 0 5px 20px rgba(88, 166, 255, 0.4);
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .fab:hover { transform: scale(1.1); background: #79c0ff; }

        /* ================= MODAL DO STUDIO (PROFISSIONAL) ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            z-index: 100; display: none; justify-content: center; align-items: center; padding: 15px;
        }
        .modal-overlay.active { display: flex; }
        
        .studio-panel {
            background: var(--panel-bg); width: 100%; max-width: 500px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .studio-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #161b22; }
        .btn-close { background: transparent; border: none; color: #ff7b72; font-size: 16px; cursor: pointer; font-weight: bold; }

        .canvas-area { background: #e1e4e8; width: 100%; aspect-ratio: 1; position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; touch-action: none; display: block; }

        .tools-area { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .tool-row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        
        /* Paleta de cores rápida */
        .color-swatches { display: flex; gap: 8px; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: #fff; transform: scale(1.1); }
        
        .btn-tool { padding: 8px 12px; border-radius: 8px; border: none; background: #30363d; color: white; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-tool.active { background: var(--accent); color: #000; }
        
        input[type="range"] { flex: 1; accent-color: var(--accent); }

        .invest-row { display: flex; gap: 10px; margin-top: 5px; }
        input[type="number"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        .btn-publish { background: var(--lendario); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1.5; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo">ArtCoin</div>
        <div class="user-profile">
            <span style="font-weight: 600;">@respaw027</span>
            <div class="wallet">🪙 <span id="balanceDisplay">1000</span></div>
        </div>
    </header>

    <main>
        <div class="feed-grid" id="feedContainer"></div>
    </main>

    <button class="fab" onclick="app.openStudio()">+</button>

    <div class="modal-overlay" id="studioModal">
        <div class="studio-panel">
            <div class="studio-header">
                <h3>Studio Criativo</h3>
                <button class="btn-close" onclick="app.closeStudio()">Cancelar</button>
            </div>
            
            <div class="canvas-area">
                <canvas id="paintCanvas"></canvas>
            </div>

            <div class="tools-area">
                <div class="tool-row">
                    <div class="color-swatches" id="swatchContainer">
                        <div class="swatch active" style="background:#000000" onclick="studio.setColor('#000000', this)"></div>
                        <div class="swatch" style="background:#ff3b30" onclick="studio.setColor('#ff3b30', this)"></div>
                        <div class="swatch" style="background:#34c759" onclick="studio.setColor('#34c759', this)"></div>
                        <div class="swatch" style="background:#007aff" onclick="studio.setColor('#007aff', this)"></div>
                        <div class="swatch" style="background:#ffcc00" onclick="studio.setColor('#ffcc00', this)"></div>
                        <div class="swatch" style="background:#af52de" onclick="studio.setColor('#af52de', this)"></div>
                    </div>
                    <input type="color" id="customColor" value="#000000" onchange="studio.setColor(this.value, null)" style="width: 35px; height: 35px; border: none; background: transparent; cursor: pointer;">
                </div>

                <div class="tool-row">
                    <button class="btn-tool active" id="btnPincel" onclick="studio.setMode('brush')">✏️ Pincel</button>
                    <button class="btn-tool" id="btnBorracha" onclick="studio.setMode('eraser')">🧼 Borracha</button>
                    <button class="btn-tool" onclick="studio.undo()">↩️ Desfazer</button>
                    <button class="btn-tool" onclick="studio.clear()" style="flex: 0.5;">🗑️</button>
                </div>

                <div class="tool-row">
                    <span style="font-size: 12px; color: #8b949e;">Tamanho:</span>
                    <input type="range" id="brushSize" min="1" max="40" value="5">
                </div>

                <div class="invest-row">
                    <input type="number" id="investInput" placeholder="Moedas (mín 10)">
                    <button class="btn-publish" onclick="app.publishArt()">Cunhar e Publicar ✨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class Database {
            static getBalance() { return parseInt(localStorage.getItem('artcoin_balance')) || 1000; }
            static setBalance(amount) {
                localStorage.setItem('artcoin_balance', amount);
                document.getElementById('balanceDisplay').innerText = amount;
            }
            static getPosts() { return JSON.parse(localStorage.getItem('artcoin_posts')) || []; }
            static savePost(post) {
                const posts = this.getPosts();
                posts.unshift(post);
                localStorage.setItem('artcoin_posts', JSON.stringify(posts));
            }
            static updatePostOwner(postId, newOwner) {
                let posts = this.getPosts();
                let post = posts.find(p => p.id === postId);
                if(post) post.owner = newOwner;
                localStorage.setItem('artcoin_posts', JSON.stringify(posts));
            }
        }

        class CanvasStudio {
            constructor() {
                this.canvas = document.getElementById('paintCanvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                this.isDrawing = false;
                this.currentColor = '#000000';
                this.mode = 'brush'; // brush ou eraser
                
                // Sistema de Histórico (Undo)
                this.history = [];
                this.historyStep = -1;

                this.setupEvents();
            }

            // Inicializa o tamanho real do canvas (precisa ser chamado quando o modal abre)
            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.ctx.lineJoin = 'round';
                this.ctx.lineCap = 'round';
                this.clear();
            }

            setupEvents() {
                this.canvas.addEventListener('mousedown', (e) => this.startPosition(e));
                this.canvas.addEventListener('mouseup', () => this.endPosition());
                this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                
                this.canvas.addEventListener('touchstart', (e) => this.startPosition(e.touches[0]));
                this.canvas.addEventListener('touchend', () => this.endPosition());
                this.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); this.draw(e.touches[0]); }, { passive: false });
            }

            saveState() {
                this.historyStep++;
                if (this.historyStep < this.history.length) { this.history.length = this.historyStep; }
                this.history.push(this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height));
            }

            undo() {
                if (this.historyStep > 0) {
                    this.historyStep--;
                    this.ctx.putImageData(this.history[this.historyStep], 0, 0);
                } else if (this.historyStep === 0) {
                    this.historyStep = -1;
                    this.clear(false); // Limpa sem salvar no histórico
                }
            }

            setMode(mode) {
                this.mode = mode;
                document.getElementById('btnPincel').classList.toggle('active', mode === 'brush');
                document.getElementById('btnBorracha').classList.toggle('active', mode === 'eraser');
            }

            setColor(color, element) {
                this.currentColor = color;
                this.setMode('brush');
                
                // Atualiza UI dos swatches
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                if(element) element.classList.add('active');
            }

            startPosition(e) {
                this.isDrawing = true;
                this.draw(e);
            }

            endPosition() {
                if(this.isDrawing) {
                    this.ctx.beginPath();
                    this.saveState(); // Salva estado após terminar o traço
                }
                this.isDrawing = false;
            }

            draw(e) {
                if (!this.isDrawing) return;
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                
                this.ctx.lineWidth = document.getElementById('brushSize').value;
                
                if (this.mode === 'eraser') {
                    this.ctx.strokeStyle = '#ffffff'; // Fundo branco
                } else {
                    this.ctx.strokeStyle = this.currentColor;
                }

                this.ctx.lineTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.moveTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
            }

            clear(saveHistory = true) {
                this.ctx.fillStyle = "#ffffff";
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                if (saveHistory) {
                    this.history = [];
                    this.historyStep = -1;
                }
            }

            getImageData() { return this.canvas.toDataURL('image/jpeg', 0.9); }
        }

        class ArtCoinApp {
            constructor() {
                this.currentUser = "@respaw027";
                Database.setBalance(Database.getBalance());
                this.loadFeed();
            }

            openStudio() {
                document.getElementById('studioModal').classList.add('active');
                setTimeout(() => studio.resize(), 50); // Garante que o canvas pegue o tamanho certo
            }

            closeStudio() {
                document.getElementById('studioModal').classList.remove('active');
            }

            publishArt() {
                const investInput = document.getElementById('investInput');
                const investAmount = parseInt(investInput.value);
                const currentBalance = Database.getBalance();

                if (isNaN(investAmount) || investAmount < 10) { alert("Mínimo de 10 moedas para cunhar arte."); return; }
                if (investAmount > currentBalance) { alert("Moedas insuficientes na carteira!"); return; }

                Database.setBalance(currentBalance - investAmount);

                let rarity = "comum";
                let borderColor = "var(--comum)";
                if (investAmount >= 1000) { rarity = "lendario"; borderColor = "var(--lendario)"; }
                else if (investAmount >= 300) { rarity = "epico"; borderColor = "var(--epico)"; }
                else if (investAmount >= 50) { rarity = "raro"; borderColor = "var(--raro)"; }

                const newPost = {
                    id: Date.now().toString(),
                    image: studio.getImageData(),
                    creator: this.currentUser,
                    owner: this.currentUser,
                    rarity: rarity,
                    borderColor: borderColor,
                    invested: investAmount,
                    price: Math.floor(investAmount * 1.5)
                };

                Database.savePost(newPost);
                investInput.value = '';
                this.closeStudio();
                this.loadFeed();
            }

            buyArt(postId, price) {
                const currentBalance = Database.getBalance();
                if (currentBalance < price) { alert("Saldo insuficiente!"); return; }

                Database.setBalance(currentBalance - price);
                Database.updatePostOwner(postId, this.currentUser);
                this.loadFeed();
            }

            loadFeed() {
                const feedContainer = document.getElementById('feedContainer');
                feedContainer.innerHTML = '';
                const posts = Database.getPosts();

                if(posts.length === 0) {
                    feedContainer.innerHTML = `<p style="text-align:center; color:#8b949e; margin-top:50px;">O feed está vazio. Clique no botão + para criar a primeira arte!</p>`;
                    return;
                }

                posts.forEach(post => {
                    const isOwner = post.owner === this.currentUser;
                    const card = document.createElement('div');
                    card.className = `art-card`;
                    card.style.borderColor = post.borderColor;
                    
                    card.innerHTML = `
                        <div style="padding: 15px; border-bottom: 1px solid #30363d;">
                            <span style="font-weight: bold; color: #fff;">${post.creator}</span>
                            <span style="color: #8b949e; font-size: 14px;"> cunhou esta arte</span>
                        </div>
                        <img src="${post.image}" class="art-image">
                        <div class="art-details">
                            <span class="badge ${post.rarity}">${post.rarity}</span>
                            <p style="font-size: 14px; margin-bottom: 10px;">Dono atual: <b>${isOwner ? 'Você' : post.owner}</b></p>
                            
                            <div class="price-row">
                                <div class="price-tag">🪙 ${post.price}</div>
                                <button class="btn-buy" ${isOwner ? 'disabled' : ''} onclick="app.buyArt('${post.id}', ${post.price})">
                                    ${isOwner ? 'Adquirido' : 'Comprar'}
                                </button>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            }
        }

        const studio = new CanvasStudio();
        const app = new ArtCoinApp();
    </script>
</body>
</html>
